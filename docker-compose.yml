services:
  migrate:
    build:
      context: .
      target: deps
      args:
        NODE_ENV: production
        FRONTEND_PORT: ${FRONTEND_PORT:?FRONTEND_PORT is required}
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_SCHEMA: ${DB_SCHEMA}
      DB_SSL: ${DB_SSL}
    command: >
      sh -c "
        echo 'Running Prisma migrations...' &&
        npx prisma migrate deploy &&
        echo 'Migrations completed successfully.'
      "
    restart: "no"

  app:
    build:
      context: .
      target: runtime
      args:
        NODE_ENV: production
        FRONTEND_PORT: ${FRONTEND_PORT:?FRONTEND_PORT is required}
    environment:
      NODE_ENV: production
      PORT: ${FRONTEND_PORT:?FRONTEND_PORT is required}
      DATABASE_URL: ${DATABASE_URL}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_SCHEMA: ${DB_SCHEMA}
      DB_SSL: ${DB_SSL}
    ports:
      - "${FRONTEND_PORT:?FRONTEND_PORT is required}:${FRONTEND_PORT:?FRONTEND_PORT is required}"
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:$${PORT}/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
