services:
  app:
    build:
      context: .
      args:
        EXTERNAL_PORT: ${EXTERNAL_PORT:-3313}
        INTERNAL_PORT: ${INTERNAL_PORT:-3313}
        POSTGRES_HOST: ${POSTGRES_HOST}
        POSTGRES_PORT: ${POSTGRES_PORT}
        POSTGRES_USER: ${POSTGRES_USER}
        POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        POSTGRES_DB: ${POSTGRES_DB}
        POSTGRES_SSL: false        
        DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}}
    ports:
      - "${EXTERNAL_PORT:-3313}:${INTERNAL_PORT:-3313}"
    networks:
      furukawatech-network:
        ipv4_address: 172.30.0.55   
    env_file:
      - docker.env
    volumes:
      - ./data:/app/data
    # Health check para garantir que a aplicação está funcionando
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3313/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Restart policy para garantir que a aplicação reinicie se falhar
    restart: unless-stopped

# Custom Network
networks:
  furukawatech-network:
    external: true
