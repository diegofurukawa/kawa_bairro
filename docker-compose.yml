services:
  migrate:
    build:
      context: .
      target: deps
      args:
        NODE_ENV: production
        FRONTEND_PORT: ${INTERNAL_PORT:?INTERNAL_PORT is required}
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@${POSTGRES_HOST:?POSTGRES_HOST is required}:${POSTGRES_PORT:?POSTGRES_PORT is required}/${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_HOST: ${POSTGRES_HOST:?POSTGRES_HOST is required}
      POSTGRES_PORT: ${POSTGRES_PORT:?POSTGRES_PORT is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_SSL: ${POSTGRES_SSL:-false}
    command: >
      sh -c "
        echo 'Running Prisma migrations...' &&
        npx prisma migrate deploy &&
        echo 'Migrations completed successfully.'
      "
    restart: "no"

  app:
    build:
      context: .
      target: runtime
      args:
        NODE_ENV: production
        FRONTEND_PORT: ${INTERNAL_PORT:?INTERNAL_PORT is required}
    environment:
      NODE_ENV: production
      PORT: ${INTERNAL_PORT:?INTERNAL_PORT is required}
      DATABASE_URL: postgresql://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@${POSTGRES_HOST:?POSTGRES_HOST is required}:${POSTGRES_PORT:?POSTGRES_PORT is required}/${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_HOST: ${POSTGRES_HOST:?POSTGRES_HOST is required}
      POSTGRES_PORT: ${POSTGRES_PORT:?POSTGRES_PORT is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_SSL: ${POSTGRES_SSL:-false}
    ports:
      - "${EXTERNAL_PORT:?EXTERNAL_PORT is required}:${INTERNAL_PORT:?INTERNAL_PORT is required}"
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:$${PORT}/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
